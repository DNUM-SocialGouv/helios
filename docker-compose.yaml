version: '3.9'

services:
  ftps-hapi:
    image: lhauspie/vsftpd-alpine
    container_name: helios_ftps_hapi
    env_file:
      - .env.local
    ports:
      - target: 990
        published: 990
      - "30000-30009:30000-30009"
    environment:
      FTP_USER: ${HAPI_FTPS_USERNAME:-infocentre_helios}
      FTP_PASS: ${HAPI_FTPS_PASSWORD:-passwordforhapi}
      FTP_MODE: ftps_implicit
      PASV_ADDRESS: "127.0.0.1"
      PASV_MIN_PORT: "30000"
      PASV_MAX_PORT: "30009"
      LOG_STDOUT: "YES"
    volumes:
      - type: bind
        source: ${PWD}/data_set/flux_hapi
        target: "/home/vsftpd/infocentre_helios/ftps/Infocentre/Production/download/STARS FIR"

  sftp-finess:
    image: atmoz/sftp
    container_name: helios_sftp_finess
    ports:
      - target: 22
        published: 24
    volumes:
      - type: bind
        source: ${HOME}/.ssh/sftp_local.pub
        target: /home/finess/.ssh/keys/sftp_local.pub
        read_only: true
      - type: bind
        source: ${PWD}/data_set
        target: /home/finess/
      - type: bind
        source: ${PWD}/sshd_config/sshd_config
        target: /etc/ssh/sshd_config
        read_only: true
    command: finess::1001

  sftp-dnum:
    image: atmoz/sftp
    container_name: helios_sftp_dnum
    ports:
      - target: 22
        published: 23
    volumes:
      - type: bind
        source: ${PWD}/data_set/diamant_chiffré
        target: /home/HELIOS/DIAMANT/incoming
      - type: bind
        source: ${PWD}/data_set/flux_sirec
        target: /home/HELIOS/SIREC
      - type: bind
        source: $PWD/data_set/flux_siicea
        target: /home/HELIOS/SIICEA
      - type: bind
        source: ${PWD}/data_set/flux_sivss
        target: /home/HELIOS/SIVSS
      - type: bind
        source: ${PWD}/data_set/flux_vigierh
        target: /home/HELIOS/VIGIE_RH
      - type: bind
        source: ${HOME}/.ssh/sftp_local.pub
        target: /home/HELIOS/.ssh/keys/sftp_local.pub
        read_only: true
    command: HELIOS::1001
  
  postgres:
    image: postgres:15.15-alpine # Conserver la même version avec le fichier de la CI : helios-ci.yml
    container_name: helios_db
    ports:
      - target: 5432
        published: 5432
    environment:
      POSTGRES_DB: helios
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: h3li0s
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=all", "-c", "max_connections=100"]
  postgres-test:
    image: postgres:15.15-alpine # Conserver la même version avec le fichier de la CI : helios-ci.yml
    container_name: helios_test_db
    ports:
      - target: 5432
        published: 5433
    environment:
      POSTGRES_DB: helios
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: h3li0s
    command: ["postgres", "-c", "log_statement=all", "-c", "max_connections=10"]

volumes:
  postgres_data:
